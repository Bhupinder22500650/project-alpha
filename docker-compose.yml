services:
  db:
    image: postgres:15-alpine
    container_name: phishing_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phishing_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phishing_pass}
      POSTGRES_DB: ${POSTGRES_DB:-phishing_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phishing_user} -d ${POSTGRES_DB:-phishing_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: phishing_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: ./backend
    container_name: phishing_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-phishing_user}:${POSTGRES_PASSWORD:-phishing_pass}@db:5432/${POSTGRES_DB:-phishing_db}
      - REDIS_URL=redis://cache:6379/0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build: 
      context: ./backend
    container_name: phishing_worker
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-phishing_user}:${POSTGRES_PASSWORD:-phishing_pass}@db:5432/${POSTGRES_DB:-phishing_db}
      - REDIS_URL=redis://cache:6379/0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - ./backend:/app

  beat:
    build: 
      context: ./backend
    container_name: phishing_beat
    restart: always
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-phishing_user}:${POSTGRES_PASSWORD:-phishing_pass}@db:5432/${POSTGRES_DB:-phishing_db}
      - REDIS_URL=redis://cache:6379/0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: phishing_frontend
    restart: always
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
